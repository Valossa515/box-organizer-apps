<div class="login-container">
  <mat-card class="login-card">
    <h1 class="login-title">Box Organizer</h1>
    <p class="subtitle">
      Entre com sua conta para gerenciar suas caixas e itens.
    </p>

    <button
      mat-raised-button
      color="primary"
      class="full-width"
      (click)="signIn()"
      [disabled]="loading"
    >
      {{ loading ? "Redirecionando..." : "Entrar" }}
    </button>

    <p *ngIf="error" class="error">{{ error }}</p>
  </mat-card>
</div>
