<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>BoxOrganizerApps</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!--
      Cabeçalhos de segurança aplicados via <meta>. Ideal complementar com headers HTTP no servidor
      (CSP via header, HSTS, X-Frame-Options) — aqui mitigamos XSS e clickjacking no front.
      Observação: 'unsafe-inline' em style-src é necessário para Angular Material/SSR em runtime.
    -->
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self';
               script-src 'self';
               style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
               font-src 'self' https://fonts.gstatic.com data:;
               img-src 'self' data: blob: https:;
               connect-src 'self' https: wss:;
               frame-ancestors 'none';
               form-action 'self';
               base-uri 'self';
               object-src 'none'" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/favicon.png" />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
  </head>
  <body class="mat-typography">
    <app-root></app-root>
  </body>
</html>
